name: NotebookLM Podcast

on:
  workflow_dispatch:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          python -V
          pip install -r requirements.txt

      - name: Restore NotebookLM session
        run: |
          mkdir -p ~/.notebooklm/profiles/default
          echo "${{ secrets.NOTEBOOKLM_STORAGE_STATE }}" | base64 -d > ~/.notebooklm/profiles/default/storage_state.json

      - name: Generate podcast
        run: |
          python main.py